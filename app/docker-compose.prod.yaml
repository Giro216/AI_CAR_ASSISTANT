name: AI_Car_Assistant

services:
  gateway:
    build:
      context: ./Service_Gateway_Api
    restart: unless-stopped
    environment:
      GATEWAY_ROUTES: '{"/api/v1/cars":"http://car-catalog:8000", "/api/v1/chat":"http://chat-bot:8000", "/api/v1/auth":"http://auth-service:8000", "/api/v1/profiles":"http://user-service:8000"}'
      GATEWAY_CORS_ORIGINS: http://91.227.68.146,http://91.227.68.146:5173
      GATEWAY_TIMEOUT_SECONDS: "30"
      GATEWAY_CHAT_TIMEOUT_SECONDS: "180"
    depends_on:
      - car-catalog
      - chat-bot
      - auth-service
      - user-service
    ports:
      - "8000:8000"
    networks:
      - frontend-nw
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  car-catalog:
    build:
      context: ./Service_Car_Catalog
    restart: unless-stopped
    env_file:
      - ./Service_Car_Catalog/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@postgres:5432/AI_assistant_cars_catalog
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chat-bot:
    build:
      context: ./Service_Chat_Bot
    restart: unless-stopped
    env_file:
      - ./Service_Chat_Bot/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@postgres:5432/ai_assistant_chat_memory
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    build:
      context: ./Service_Authentication
    restart: unless-stopped
    env_file:
      - ./Service_Authentication/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ai_assistant_auth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  user-service:
    build:
      context: ./Service_User_Profile
    restart: unless-stopped
    env_file:
      - ./Service_User_Profile/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ai_assistant_user_profile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./Service_Frontend
    restart: unless-stopped
    environment:
      VITE_GATEWAY_URL: http://91.227.68.146:8000
    depends_on:
      - gateway
    ports:
      - "80:5173"
    networks:
      - frontend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: AI_assistant_cars_catalog
      POSTGRES_MULTIPLE_DATABASES: ai_assistant_auth,ai_assistant_chat_memory,ai_assistant_user_profile
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
      - ./Service_Car_Catalog/app/scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/00_init_multiple_dbs.sh:ro
      
      - ./Service_Car_Catalog/app/scripts/init_db_from_dataset.sql:/docker-entrypoint-initdb.d/01_init_db_from_dataset.sql:ro      
      - ./Service_Chat_Bot/scripts/create_tables.sql:/docker-entrypoint-initdb.d/chat_memory_init.sql:ro
      - ./Service_User_Profile/app/core/db.sql:/docker-entrypoint-initdb.d/user_profile_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AI_assistant_cars_catalog"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-nw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge

volumes:
  postgres_data:
  redis_data: